<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Hallucination Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0d0d;
      --surface:     #161616;
      --surface-2:   #1e1e1e;
      --border:      #2a2a2a;
      --text:        #e8e8e8;
      --muted:       #666;
      --user-bg:     #1d4ed8;
      --accent:      #7c3aed;
      --green:       #4ade80;
      --red:         #f87171;
      --yellow:      #fbbf24;
      --orange:      #fb923c;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    header h1 { font-size: 15px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ── Messages ────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      pointer-events: none;
    }

    #empty .big-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 4px;
    }

    #empty h2 { font-size: 20px; font-weight: 600; color: var(--text); }
    #empty p  { font-size: 14px; }

    /* ── User message ────────────────────────────────────────── */
    .msg-user {
      align-self: flex-end;
      background: var(--user-bg);
      color: #fff;
      padding: 11px 16px;
      border-radius: 18px 18px 4px 18px;
      max-width: 68%;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    /* ── Bot message ─────────────────────────────────────────── */
    .msg-bot {
      align-self: flex-start;
      max-width: 82%;
      width: 100%;
    }

    .bot-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 18px 18px 18px;
      padding: 16px 20px;
      font-size: 14px;
    }

    /* ── Status list ─────────────────────────────────────────── */
    .status-list { display: flex; flex-direction: column; gap: 9px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
    }

    .status-row.s-active  { color: #aaa; }
    .status-row.s-done    { color: #4ade80; }
    .status-row.s-warning {
      color: var(--yellow);
      font-weight: 500;
      background: rgba(251,191,36,.06);
      border: 1px solid rgba(251,191,36,.18);
      border-radius: 8px;
      padding: 7px 10px;
      margin: 2px 0;
    }
    .status-row.s-error { color: var(--red); }

    /* spinner */
    .spin {
      width: 13px; height: 13px; flex-shrink: 0;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .icon { font-size: 13px; flex-shrink: 0; line-height: 1; }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    /* ── Answer text ─────────────────────────────────────────── */
    .answer-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .answer-text sup { font-size: 10px; }
    .answer-text sup a {
      color: var(--accent);
      text-decoration: none;
    }
    .answer-text sup a:hover { text-decoration: underline; }

    /* blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 15px;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Badges ──────────────────────────────────────────────── */
    .badges {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 12px; font-weight: 500;
    }

    .badge-rag  { background: rgba(124,58,237,.12); color: #a78bfa; border: 1px solid rgba(124,58,237,.25); }
    .badge-web  { background: rgba(251,146,60,.12);  color: var(--orange); border: 1px solid rgba(251,146,60,.25); }
    .badge-ok   { background: rgba(74,222,128,.12);  color: var(--green);  border: 1px solid rgba(74,222,128,.25); }
    .badge-bad  { background: rgba(248,113,113,.12); color: var(--red);    border: 1px solid rgba(248,113,113,.25); }

    /* ── Explanation box ─────────────────────────────────────── */
    .explain-box {
      margin-top: 12px;
      padding: 11px 14px;
      background: var(--surface-2);
      border-radius: 8px;
      border-left: 3px solid var(--red);
      font-size: 13px;
      color: #bbb;
      line-height: 1.55;
    }

    .explain-box strong {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--red);
      margin-bottom: 5px;
    }

    /* ── Citations ───────────────────────────────────────────── */
    .cite-section { margin-top: 12px; }

    .cite-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 12px;
      display: flex; align-items: center; gap: 5px;
      padding: 3px 0;
      transition: color .15s;
    }
    .cite-toggle:hover { color: var(--text); }

    .cite-list {
      display: none;
      flex-direction: column;
      gap: 5px;
      margin-top: 7px;
    }
    .cite-list.open { display: flex; }

    .cite-item {
      font-size: 12px;
      color: var(--muted);
      padding: 7px 10px;
      background: var(--surface-2);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      line-height: 1.45;
      word-break: break-word;
    }
    .cite-item strong { color: #ccc; font-weight: 500; }
    .cite-item a { color: #a78bfa; text-decoration: none; font-weight: 500; }
    .cite-item a:hover { text-decoration: underline; }
    .cite-doc-name { color: #c4b5fd; font-weight: 500; }

    .cite-context {
      margin-top: 6px;
      padding: 7px 9px;
      background: rgba(255,255,255,.03);
      border-radius: 4px;
      font-size: 11px;
      color: #777;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 80px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: max-height .2s ease;
    }
    .cite-context.expanded { max-height: 600px; }
    .cite-context::after {
      content: '▾ show more';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 2px;
      background: linear-gradient(transparent, var(--surface-2));
      font-size: 10px;
      color: var(--accent);
      letter-spacing: .04em;
    }
    .cite-context.expanded::after { content: '▴ show less'; background: none; position: static; height: auto; padding: 4px 0 0; display: block; text-align: center; }

    /* ── Input area ──────────────────────────────────────────── */
    #input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 24px 18px;
    }

    .input-wrap {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #q {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 15px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.55;
      max-height: 180px;
      transition: border-color .15s;
    }
    #q:focus { border-color: var(--accent); }
    #q::placeholder { color: var(--muted); }

    #send-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { opacity: .88; }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Constrain messages width ────────────────────────────── */
    #messages > * { max-width: 820px; width: 100%; align-self: center; }
    .msg-user { align-self: flex-end !important; max-width: 580px; }
    .msg-bot  { align-self: flex-start !important; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🔍</div>
    <div>
      <h1>RAG Hallucination Detector</h1>
      <p>Powered by GPT-4o · ChromaDB · DuckDuckGo</p>
    </div>
  </header>

  <div id="messages">
    <div id="empty">
      <div class="big-logo">🔍</div>
      <h2>Ask a research question</h2>
      <p>Answers are grounded in your knowledge base and verified for hallucinations.</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrap">
      <textarea id="q" rows="1" placeholder="Ask a research question…"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty');
  const qEl        = document.getElementById('q');
  const sendBtn    = document.getElementById('send-btn');

  /* ── Helpers ──────────────────────────────────────────────── */
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* Extract the ANSWER section from the structured LLM response */
  function extractAnswer(full) {
    const m = full.match(/ANSWER\s*[-─]{2,}\s*([\s\S]*?)(?=\n\s*(?:SUPPORTING CONTEXT|REFERENCES)|$)/i);
    return m ? m[1].trim() : full.trim();
  }

  /* Replace [N] citation markers with superscripts.
     Web citations (have a url) become links; local RAG docs are plain. */
  function linkCitations(text, cites) {
    return esc(text).replace(/\[(\d+)\]/g, (_, n) => {
      const c = cites[n];
      if (c && c.url) {
        return `<sup><a href="${esc(c.url)}" target="_blank" rel="noopener">[${n}]</a></sup>`;
      }
      return `<sup>[${n}]</sup>`;
    });
  }

  /* ── Typewriter ───────────────────────────────────────────── */
  function typewriter(el, text, cites, onDone) {
    const speed = Math.max(4, Math.min(14, 5000 / text.length));
    const tNode = document.createTextNode('');
    const cur   = document.createElement('span');
    cur.className = 'cursor';
    el.innerHTML = '';
    el.appendChild(tNode);
    el.appendChild(cur);

    let i = 0;
    function step() {
      if (i < text.length) {
        tNode.data = text.slice(0, ++i);
        if (i % 80 === 0) scrollBottom();
        setTimeout(step, speed);
      } else {
        cur.remove();
        /* swap to HTML with linked citation superscripts */
        el.innerHTML = linkCitations(text, cites);
        if (onDone) onDone();
      }
    }
    step();
  }

  /* ── Build a bot message shell ────────────────────────────── */
  function createBotShell() {
    const wrap   = document.createElement('div');
    wrap.className = 'msg-bot';
    const bubble = document.createElement('div');
    bubble.className = 'bot-bubble';
    const sList  = document.createElement('div');
    sList.className = 'status-list';
    bubble.appendChild(sList);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return { bubble, sList };
  }

  /* ── Status row helpers ───────────────────────────────────── */
  let _activeRow = null;

  function addStatusRow(sList, msg, kind) {
    const row = document.createElement('div');
    row.className = `status-row s-${kind}`;

    if (kind === 'active') {
      const sp = document.createElement('div'); sp.className = 'spin';
      row.appendChild(sp);
    } else if (kind === 'done') {
      const ic = document.createElement('span'); ic.className = 'icon'; ic.textContent = '✓';
      row.appendChild(ic);
    } else if (kind === 'warning') {
      const ic = document.createElement('span'); ic.className = 'icon'; ic.textContent = '⚠';
      row.appendChild(ic);
    } else if (kind === 'error') {
      const ic = document.createElement('span'); ic.className = 'icon'; ic.textContent = '✗';
      row.appendChild(ic);
    }

    const t = document.createElement('span'); t.textContent = msg;
    row.appendChild(t);
    sList.appendChild(row);
    scrollBottom();
    return row;
  }

  function completeCurrent() {
    if (!_activeRow) return;
    const textSpan = _activeRow.querySelector('span:last-child');
    const msg = textSpan ? textSpan.textContent : '';
    _activeRow.className = 'status-row s-done';
    _activeRow.innerHTML = '';
    const ic = document.createElement('span'); ic.className = 'icon'; ic.textContent = '✓';
    _activeRow.appendChild(ic);
    const t = document.createElement('span'); t.textContent = msg;
    _activeRow.appendChild(t);
    _activeRow = null;
  }

  /* ── Render final result ──────────────────────────────────── */
  function renderResult(bubble, sList, data) {
    /* divider */
    const hr = document.createElement('hr');
    hr.className = 'divider';
    bubble.appendChild(hr);

    /* answer text with typewriter */
    const ansEl = document.createElement('div');
    ansEl.className = 'answer-text';
    bubble.appendChild(ansEl);

    const answerText = extractAnswer(data.answer);

    const allCitesForLinks = { ...data.citations, ...data.web_citations };
    typewriter(ansEl, answerText, allCitesForLinks, () => {
      /* badges */
      const badgeRow = document.createElement('div');
      badgeRow.className = 'badges';

      const src = document.createElement('span');
      src.className = `badge ${data.source === 'rag' ? 'badge-rag' : 'badge-web'}`;
      src.innerHTML = data.source === 'rag'
        ? '⬡&nbsp; Source: Knowledge Base'
        : '🌐&nbsp; Source: Web Search';
      badgeRow.appendChild(src);

      const scorePct = Math.round(data.score * 100);
      const hal = document.createElement('span');
      hal.className = `badge ${data.is_hallucinated ? 'badge-bad' : 'badge-ok'}`;
      hal.innerHTML = data.is_hallucinated
        ? `⚠&nbsp; Hallucinated &middot; ${scorePct}%`
        : `✓&nbsp; Grounded &middot; ${scorePct}%`;
      badgeRow.appendChild(hal);

      bubble.appendChild(badgeRow);

      /* hallucination explanation */
      if (data.is_hallucinated && data.explanation) {
        const box = document.createElement('div');
        box.className = 'explain-box';
        const typeLabel = (data.hallucination_type || '')
          .replace(/_/g, ' ')
          .replace(/\b\w/g, c => c.toUpperCase());
        box.innerHTML = `<strong>Hallucination · ${esc(typeLabel)}</strong>${esc(data.explanation)}`;
        if (data.problematic_sentences && data.problematic_sentences.length) {
          const ul = document.createElement('ul');
          ul.style.cssText = 'margin-top:7px;padding-left:16px;font-size:12px;';
          data.problematic_sentences.forEach(s => {
            const li = document.createElement('li');
            li.textContent = s;
            ul.appendChild(li);
          });
          box.appendChild(ul);
        }
        bubble.appendChild(box);
      }

      /* citations — only those actually referenced inline in the answer */
      const allCites = { ...data.citations, ...data.web_citations };
      const usedNums = new Set((answerText.match(/\[(\d+)\]/g) || []).map(m => m.replace(/\D/g, '')));
      const citeKeys = Object.keys(allCites).filter(k => usedNums.has(k));
      if (citeKeys.length) {
        const sec = document.createElement('div');
        sec.className = 'cite-section';

        const toggle = document.createElement('button');
        toggle.className = 'cite-toggle';
        toggle.textContent = `▶  Sources (${citeKeys.length})`;

        const list = document.createElement('div');
        list.className = 'cite-list';

        /* Deduplicate by paper_id (RAG) or url (web) — group citation numbers */
        const seen = new Map(); // key → { c, nums[] }
        citeKeys.forEach(k => {
          const c = allCites[k];
          const dedupeKey = c.paper_id || c.url || k;
          if (!seen.has(dedupeKey)) seen.set(dedupeKey, { c, nums: [] });
          seen.get(dedupeKey).nums.push(k);
        });
        const uniqueCount = seen.size;

        toggle.addEventListener('click', () => {
          list.classList.toggle('open');
          toggle.textContent = list.classList.contains('open')
            ? `▼  Sources (${uniqueCount})`
            : `▶  Sources (${uniqueCount})`;
        });
        toggle.textContent = `▶  Sources (${uniqueCount})`;

        seen.forEach(({ c, nums }) => {
          const item = document.createElement('div');
          item.className = 'cite-item';
          const label = `[${nums[0]}]`;
          if (c.url) {
            item.innerHTML = `${esc(label)} <a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title || c.url)}</a>`;
          } else {
            /* Local document — use paper_id (filename stem) as the clean label */
            const docName = (c.paper_id || 'Document').replace(/\s{2,}/g, ' ');
            item.innerHTML = `${esc(label)} <span class="cite-doc-name">📄 ${esc(docName)}</span>`;
          }

          /* context excerpt — chunk text for RAG, snippet for web */
          const rawContext = c.context || c.snippet || '';
          /* collapse pypdf artifacts: single newlines → space, multi-spaces → single */
          const contextText = rawContext
            .replace(/\n(?!\n)/g, ' ')
            .replace(/ {2,}/g, ' ')
            .trim();
          if (contextText) {
            const ctx = document.createElement('div');
            ctx.className = 'cite-context';
            ctx.textContent = contextText;
            ctx.addEventListener('click', () => ctx.classList.toggle('expanded'));
            item.appendChild(ctx);
          }

          list.appendChild(item);
        });

        sec.appendChild(toggle);
        sec.appendChild(list);
        bubble.appendChild(sec);
      }

      scrollBottom();
    });
  }

  /* ── Send a question ─────────────────────────────────────── */
  async function send() {
    const question = qEl.value.trim();
    if (!question) return;
    qEl.value = '';
    qEl.style.height = 'auto';
    sendBtn.disabled = true;
    qEl.disabled = true;

    /* hide empty state */
    emptyEl.style.display = 'none';

    /* user bubble */
    const uEl = document.createElement('div');
    uEl.className = 'msg-user';
    uEl.textContent = question;
    messagesEl.appendChild(uEl);

    /* bot shell */
    const { bubble, sList } = createBotShell();
    _activeRow = null;

    try {
      const resp = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch { continue; }

          if (evt.type === 'status') {
            completeCurrent();
            _activeRow = addStatusRow(sList, evt.message, 'active');

          } else if (evt.type === 'web_fallback') {
            completeCurrent();
            /* web-fallback is a warning row, not "active" — no spinner */
            addStatusRow(sList, evt.message, 'warning');
            _activeRow = null;

          } else if (evt.type === 'result') {
            completeCurrent();
            renderResult(bubble, sList, evt.data);

          } else if (evt.type === 'error') {
            completeCurrent();
            addStatusRow(sList, evt.message, 'error');
          }
        }
      }
    } catch (err) {
      completeCurrent();
      addStatusRow(sList, `Connection error: ${err.message}`, 'error');
    } finally {
      sendBtn.disabled = false;
      qEl.disabled = false;
      qEl.focus();
    }
  }

  /* ── Events ──────────────────────────────────────────────── */
  sendBtn.addEventListener('click', send);

  qEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  qEl.addEventListener('input', () => {
    qEl.style.height = 'auto';
    qEl.style.height = Math.min(qEl.scrollHeight, 180) + 'px';
  });
</script>
</body>
</html>
